name: StarFlowBench
options:
  bundleIdPrefix: com.chinmay
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
targets:
  StarFlowBench:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: StarFlow Bench
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: Camera access is required for the capture-cadence test and for DockKit gimbal control.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chinmay.starflowbench
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
